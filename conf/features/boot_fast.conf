# =============================================================================
# 功能片段：启动时间优化（叠加于 prj.conf）
# =============================================================================
#
# 用途：缩短冷启动时间，关闭日志/Shell/示例等非关键路径
# 可与 profiles/ 档位叠加；若已用 minimal/tiny 档位，部分项可能重复
#
# 构建（快速档，目标 <100ms）：
#   west build -b <board> . -- -DCONF_FILE="prj.conf;conf/features/boot_fast.conf"
#
# 极限档（目标 <50ms）：注释掉「档位 A」块，取消「档位 B」块注释
#
# =============================================================================

# =============================================================================
# 档位 A：快速启动（目标 <100ms）— 默认启用
# =============================================================================

# --- 日志与子系统 ---
CONFIG_SYS_LOG_ENABLE=n
CONFIG_LOG=n
CONFIG_LOG_BACKEND_UART=n
CONFIG_LOG_MODE_IMMEDIATE=n
CONFIG_PRINTK=n
CONFIG_SYS_WATCHDOG_ENABLE=n
CONFIG_THREAD_IPC_SERVICE=n

# --- 内存与事件 ---
CONFIG_SYS_MEMORY_POOL_SIZE=4096
CONFIG_HEAP_MEM_POOL_SIZE=4096
CONFIG_EVENT_QUEUE_SIZE=32
CONFIG_EVENT_MAX_SUBSCRIBERS=8
CONFIG_EVENT_SLAB_ENABLE=n

# --- 应用与控制台 ---
CONFIG_APP_ENABLE_SHELL=n
CONFIG_APP_ENABLE_STATS=n
CONFIG_APP_ENABLE_LOG_DUMP=n
CONFIG_APP_HEARTBEAT_INTERVAL_MS=0
CONFIG_EXAMPLE_MODULE_A_ENABLE=n
CONFIG_EXAMPLE_MODULE_B_ENABLE=n
CONFIG_SHELL=n
CONFIG_CONSOLE=n
CONFIG_UART_CONSOLE=n

# =============================================================================
# 档位 B：极限启动（目标 <50ms）— 默认注释，启用时注释掉档位 A 并取消本块注释
# =============================================================================

