# =============================================================================
# 功能片段：Data Bus（叠加于 prj.conf + standard.conf，CMake 默认自动合并）
# =============================================================================
#
# 用途：启用数据总线及 Slab 池、事件桥
# 构建：默认已合并；单独禁用时在自定义 CONF_FILE 中设 CONFIG_DATA_BUS=n
#
# =============================================================================

CONFIG_DATA_BUS=y
CONFIG_DATA_BUS_CHANNEL_NAME_MAX=16
CONFIG_DATA_BUS_MAX_CHANNELS=8
CONFIG_DATA_BUS_MAX_CONSUMERS_PER_CHANNEL=4
CONFIG_DATA_BUS_CHANNEL_QUEUE_DEPTH=16
CONFIG_DATA_BUS_MAX_BLOCKS=32
CONFIG_DATA_BUS_DISPATCHER_STACK_SIZE=2048
CONFIG_DATA_BUS_DISPATCHER_PRIORITY=5
CONFIG_DATA_BUS_SLAB_ENABLE=y
CONFIG_DATA_BUS_SLAB_256_COUNT=8
CONFIG_DATA_BUS_SLAB_1K_COUNT=4
CONFIG_DATA_BUS_SLAB_4K_COUNT=2
CONFIG_DATA_BUS_EVENT_BRIDGE=y
