# =============================================================================
# 功能片段：应用 KV 掉电持久化（叠加于 prj.conf）
# =============================================================================
#
# 用途：通过 Zephyr Settings + NVS 将 app_kv 写入 Flash
# 要求：
#   - 板级 devicetree 已有 storage 分区，且 chosen 指向该分区
#   - nucleo_l4r5zi：boards/nucleo_l4r5zi.overlay（640KB SRAM + settings-partition）
#   - 无 Flash 目标（native_posix / native_sim）勿合并本文件
#
# 构建：
#   west build -b nucleo_l4r5zi . \
#     -- "-DCONF_FILE=prj.conf;conf/features/app_kv_persist.conf"
#
# 说明：SETTINGS_NVS 为 Zephyr choice 项，须在 fragment 中显式打开，Kconfig 无法用 select
#
# =============================================================================

# -----------------------------------------------------------------------------
# Flash 与 Settings 后端（顺序敏感：FLASH 须在前）
# -----------------------------------------------------------------------------

CONFIG_FLASH=y
CONFIG_SETTINGS=y
CONFIG_NVS=y
CONFIG_FLASH_MAP=y
CONFIG_SETTINGS_NVS=y

# -----------------------------------------------------------------------------
# 应用 KV 持久化
# -----------------------------------------------------------------------------

CONFIG_APP_KV_PERSIST=y

# 每次 set/del/clear 都写 flash（耗寿命）；默认关，改用 app kv save 或 app_kv_save()
# CONFIG_APP_KV_PERSIST_AUTOSAVE=y
