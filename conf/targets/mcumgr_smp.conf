# Application-side OTA via MCUmgr SMP (primary product path)
# 用法：west build -b <board> . -- -DEXTRA_CONF_FILE=conf/targets/mcumgr_smp.conf
#
# 须设备树含 MCUboot slot 分区。按板型在 overlay 中配置 SMP 传输，例如 UART：
#   / { chosen { zephyr,uart-mcumgr = &uart1; }; };
# 可同时启用 BLE / UDP：在下方取消注释对应 CONFIG_MCUMGR_TRANSPORT_*。
#
# 自建协议扩展（Modbus/HTTP 等 write_chunk 路径）：
#   CONFIG_OTA_TRANSPORT_ACTIVE=y
#
# 主机升级示例（Windows）：
#   mcumgr conn add serial_1 type="serial" connstring="COM3,baud=115200"
#   mcumgr image upload signed-app.bin -c serial_1
#   mcumgr reset -c serial_1

# MCUboot 应用侧镜像管理（img_mgmt / flash_img）
CONFIG_BOOTLOADER_MCUBOOT=y
CONFIG_IMG_MANAGER=y
CONFIG_IMG_ERASE_PROGRESSIVELY=y
CONFIG_STREAM_FLASH=y
CONFIG_FLASH_MAP=y
CONFIG_MCUBOOT_BOOTUTIL_LIB=y

CONFIG_OTA_MODULE=y
CONFIG_OTA_TRANSPORT_MCUMGR_SMP=y
# CONFIG_OTA_TRANSPORT_ACTIVE=y
CONFIG_OTA_EXPECTED_IMAGE_SIZE=524288
CONFIG_MODULE_MANAGER=y
CONFIG_EVENT_SYSTEM=y

# MCUmgr SMP（默认 UART；按需叠加其它传输）
CONFIG_MCUMGR=y
CONFIG_MCUMGR_TRANSPORT_UART=y
CONFIG_UART_MCUMGR=y
# CONFIG_MCUMGR_TRANSPORT_BT=y
# CONFIG_MCUMGR_TRANSPORT_UDP=y
CONFIG_MCUMGR_MGMT_NOTIFICATION_HOOKS=y
CONFIG_MCUMGR_GRP_IMG=y
CONFIG_MCUMGR_GRP_IMG_MUTEX=y
CONFIG_MCUMGR_GRP_IMG_STATUS_HOOKS=y
CONFIG_MCUMGR_GRP_IMG_UPLOAD_CHECK_HOOK=y
CONFIG_MCUMGR_GRP_OS=y

CONFIG_ZCBOR=y
CONFIG_NET_BUF=y
CONFIG_CRC=y
CONFIG_BASE64=y

CONFIG_SERIAL=y
CONFIG_UART_INTERRUPT_DRIVEN=y
CONFIG_CONSOLE=y

CONFIG_MAIN_STACK_SIZE=4096
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=4096
CONFIG_MCUMGR_TRANSPORT_UART_MTU=512
