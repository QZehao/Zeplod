# Production target overlay — 量产固件推荐叠加
# 用法：west build -b <board> . -- -DEXTRA_CONF_FILE=conf/targets/production.conf
#
# 与发布流程对齐见：docs/zh-CN/70-发布与产品化/74-OTA与存储扩展指南.md

# 启动与日志收紧
CONFIG_APP_BOOT_VERBOSE=n
CONFIG_BOOT_BANNER=n
CONFIG_LOG_DEFAULT_LEVEL=2
CONFIG_LOG_MAX_LEVEL=2
CONFIG_LOG_OVERRIDE_LEVEL=2

# 安全、恢复与看门狗
CONFIG_REBOOT=y
CONFIG_SYS_SECURE_KV_ENABLE=y
CONFIG_SYS_WATCHDOG_ENABLE=y
CONFIG_RECOVERY_POLICY_MODULE=y
CONFIG_SYS_FAULT_DUMP_ENABLE=y
CONFIG_MODULE_MANAGER=y
CONFIG_EVENT_SYSTEM=y

# 产测模块默认关闭（产线固件用 conf/features/factory_mode.conf 单独叠加）
CONFIG_FACTORY_MODE_MODULE=n

# 可选：现场关闭 Shell（取消注释）
# CONFIG_APP_ENABLE_SHELL=n
