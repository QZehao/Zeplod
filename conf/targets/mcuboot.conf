# MCUboot OTA target overlay — 与板级分区表一并使用
# 用法：west build -b <board> . -- -DEXTRA_CONF_FILE=conf/targets/mcuboot.conf
#
# 须确保设备树含 slot0/slot1 分区；完整流程见 docs/zh-CN/70-发布与产品化/74-OTA与存储扩展指南.md

CONFIG_BOOTLOADER_MCUBOOT=y
CONFIG_IMG_MANAGER=y
CONFIG_IMG_ERASE_PROGRESSIVELY=y
CONFIG_STREAM_FLASH=y
CONFIG_FLASH_MAP=y
CONFIG_MCUBOOT_BOOTUTIL_LIB=y

CONFIG_OTA_MODULE=y
CONFIG_OTA_TRANSPORT_MCUBOOT=y
CONFIG_OTA_EXPECTED_IMAGE_SIZE=524288

CONFIG_MODULE_MANAGER=y
CONFIG_EVENT_SYSTEM=y
