# =============================================================================
# 目标环境：QEMU 仿真（叠加于默认标准链）
# =============================================================================
#
# 用途：在标准配置上削减 RAM/栈，关闭无仿真硬件依赖的功能
# 适用板型：qemu_riscv32、qemu_cortex_m3、qemu_x86_64 等
#
# 完整合并链（framework 模式，run_qemu.ps1 默认）：
#   prj.conf + standard + data_bus + thread_ipc + 本文件
#
# 手动构建：
#   west build -b qemu_riscv32 . -- \
#     "-DCONF_FILE=prj.conf;conf/profiles/standard.conf;conf/features/data_bus.conf;conf/features/thread_ipc.conf;conf/targets/qemu.conf"
#
# =============================================================================

# -----------------------------------------------------------------------------
# 内核内存 — 仿真友好规模
# -----------------------------------------------------------------------------

CONFIG_HEAP_MEM_POOL_SIZE=16384
CONFIG_MAIN_STACK_SIZE=4096
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2048
CONFIG_EVENT_DISPATCHER_STACK_SIZE=2048
CONFIG_SYS_MEMORY_POOL_SIZE=4096

# -----------------------------------------------------------------------------
# 事件系统 — 精简 Slab 池
# -----------------------------------------------------------------------------

CONFIG_EVENT_QUEUE_SIZE=32
CONFIG_EVENT_MAX_SUBSCRIBERS=8
CONFIG_EVENT_SLAB_CRITICAL_COUNT=4
CONFIG_EVENT_SLAB_HIGH_COUNT=8
CONFIG_EVENT_SLAB_NORMAL_COUNT=16
CONFIG_EVENT_SLAB_LARGE_256_COUNT=4
CONFIG_EVENT_SLAB_LARGE_1K_COUNT=2
CONFIG_EVENT_SLAB_LARGE_4K_COUNT=0

# -----------------------------------------------------------------------------
# 模块 — 单示例即可验证启动
# -----------------------------------------------------------------------------

CONFIG_MAX_MODULES=8
CONFIG_EXAMPLE_MODULE_A_ENABLE=y
CONFIG_EXAMPLE_MODULE_B_ENABLE=n

# -----------------------------------------------------------------------------
# 应用 — 关闭非必要功能
# -----------------------------------------------------------------------------

CONFIG_APP_KV_ENABLE=n
CONFIG_APP_ENABLE_STATS=n
CONFIG_APP_ENABLE_LOG_DUMP=n

# -----------------------------------------------------------------------------
# 看门狗 — 保持关闭（QEMU 无硬件 WDT；避免 sys_reboot 链接问题）
# -----------------------------------------------------------------------------

CONFIG_SYS_WATCHDOG_ENABLE=n
CONFIG_WATCHDOG=n
