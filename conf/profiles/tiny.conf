# =============================================================================
# 内存档位：极限版（叠加于 prj.conf，建议替换整条 CONF_FILE 链）
# =============================================================================
#
# 用途：≤32KB SRAM，框架 <10KB，预留 >22KB 给应用
# 示例板型：mimxrt1050_fire（32KB SRAM）
#
# 构建（须 --pristine，且勿合并 standard / features 默认链）：
#   west build -b mimxrt1050_fire/mimxrt1052/qspi . \
#     -- -DCONF_FILE="prj.conf;conf/profiles/tiny.conf" --pristine
#
# =============================================================================

# --- 基础系统：全部关闭 ---
CONFIG_SHELL=n
CONFIG_CONSOLE=n
CONFIG_SERIAL=n
CONFIG_UART_CONSOLE=n
CONFIG_PRINTK=n
CONFIG_EARLY_CONSOLE=n
CONFIG_LOG=n
CONFIG_ASSERT=n

# --- 内核内存 ---
CONFIG_KERNEL_MEM_POOL=y
CONFIG_HEAP_MEM_POOL_SIZE=1024
CONFIG_MAIN_STACK_SIZE=512
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=256
CONFIG_IDLE_STACK_SIZE=128
CONFIG_ISR_STACK_SIZE=512
CONFIG_EVENT_DISPATCHER_STACK_SIZE=256
CONFIG_SYS_MEMORY_POOL_SIZE=0
CONFIG_SYS_MEMORY_ENABLE=n

# --- 事件系统 ---
CONFIG_EVENT_QUEUE_SIZE=4
CONFIG_EVENT_MAX_SUBSCRIBERS=1
CONFIG_EVENT_MAX_TYPES=8
CONFIG_EVENT_STRUCT_SIZE_32=y
CONFIG_EVENT_SLAB_CRITICAL_COUNT=1
CONFIG_EVENT_SLAB_HIGH_COUNT=2
CONFIG_EVENT_SLAB_NORMAL_COUNT=4
CONFIG_EVENT_SLAB_LARGE_ENABLE=n
CONFIG_EVENT_RUNTIME_STATUS=n
CONFIG_EVENT_SLAB_EXHAUSTED_CB=n
CONFIG_EVENT_DEBUG_MEM=n

# --- 模块与服务 ---
CONFIG_MAX_MODULES=2
CONFIG_SYS_LOG_LEVEL=0
CONFIG_SYS_LOG_ENABLE=n
CONFIG_SYS_TIMER_ENABLE=n

# --- 应用功能 ---
CONFIG_APP_ENABLE_SHELL=n
CONFIG_APP_ENABLE_STATS=n
CONFIG_APP_ENABLE_LOG_DUMP=n
CONFIG_APP_HEARTBEAT_INTERVAL_MS=0
CONFIG_EXAMPLE_MODULE_A_ENABLE=n
CONFIG_EXAMPLE_MODULE_B_ENABLE=n
CONFIG_APP_KV_ENABLE=n
CONFIG_APP_KV_PERSIST=n

# --- 子系统关闭 ---
CONFIG_THREAD_IPC_SERVICE=n
CONFIG_THREAD_IPC_SERVICE_EVENT_BRIDGE=n
CONFIG_DATA_BUS=n

# --- 内核裁剪 ---
CONFIG_USERSPACE=n
CONFIG_THREAD_NAME=n
CONFIG_THREAD_MONITOR=n
CONFIG_THREAD_RUNTIME_STATS=n
CONFIG_SCHED_SCALABLE=n
CONFIG_WAITQ_SCALABLE=n
CONFIG_TIMESLICING=n
CONFIG_SCHED_DUMB=y
CONFIG_WAITQ_DUMB=y
CONFIG_SIZE_OPTIMIZATIONS=y
CONFIG_SPEED_OPTIMIZATIONS=n
CONFIG_DEBUG_OPTIMIZATIONS=n
