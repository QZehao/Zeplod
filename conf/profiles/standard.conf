# =============================================================================
# 内存档位：标准版（叠加于 prj.conf，CMake 默认自动合并）
# =============================================================================
#
# 用途：资源充足 MCU 的默认生产配置
# 目标 SRAM：≥ 256KB
# 框架占用：约 190KB
# 示例板型：STM32H7、nRF52840
#
# 单独构建（无 CMake 默认链时）：
#   west build -b <board> . -- -DCONF_FILE="prj.conf;conf/profiles/standard.conf"
#
# 切换档位请用 EXTRA_CONF_FILE 覆盖本文件中的对应项，勿与 balanced/minimal/tiny 同时合并
#
# =============================================================================

# -----------------------------------------------------------------------------
# 基础系统 — 调试与控制台
# -----------------------------------------------------------------------------

CONFIG_SHELL=y
CONFIG_CONSOLE=y
CONFIG_SERIAL=y
CONFIG_UART_CONSOLE=y
CONFIG_PRINTK=y
CONFIG_EARLY_CONSOLE=y
CONFIG_BOOT_BANNER=n

# 日志系统
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3
CONFIG_LOG_MAX_LEVEL=3
CONFIG_LOG_OVERRIDE_LEVEL=3
CONFIG_LOG_RUNTIME_FILTERING=n
CONFIG_LOG_MODE_IMMEDIATE=y
CONFIG_LOG_BACKEND_UART=y

CONFIG_KERNEL_LOG_LEVEL_ERR=y
CONFIG_ARCH_LOG_LEVEL_ERR=y
CONFIG_MPU_LOG_LEVEL_OFF=y

CONFIG_DEBUG=n
CONFIG_ASSERT=y

# -----------------------------------------------------------------------------
# 内核内存
# -----------------------------------------------------------------------------

CONFIG_HEAP_MEM_POOL_SIZE=65536
CONFIG_MAIN_STACK_SIZE=4096
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2048
CONFIG_EVENT_DISPATCHER_STACK_SIZE=2048
CONFIG_SYS_MEMORY_POOL_SIZE=8192

# -----------------------------------------------------------------------------
# 事件系统 — 标准容量
# -----------------------------------------------------------------------------

CONFIG_EVENT_QUEUE_SIZE=64
CONFIG_EVENT_MAX_SUBSCRIBERS=16

CONFIG_EVENT_SLAB_ENABLE=y
CONFIG_EVENT_STRUCT_SIZE_64=y
CONFIG_EVENT_SLAB_CRITICAL_COUNT=8
CONFIG_EVENT_SLAB_HIGH_COUNT=16
CONFIG_EVENT_SLAB_NORMAL_COUNT=32
CONFIG_EVENT_SLAB_LARGE_ENABLE=y
CONFIG_EVENT_SLAB_LARGE_256_COUNT=8
CONFIG_EVENT_SLAB_LARGE_1K_COUNT=4
CONFIG_EVENT_SLAB_LARGE_4K_COUNT=2

CONFIG_EVENT_RUNTIME_STATUS=y
CONFIG_EVENT_SLAB_EXHAUSTED_CB=n
CONFIG_EVENT_DEBUG_MEM=n

# -----------------------------------------------------------------------------
# 模块管理器
# -----------------------------------------------------------------------------

CONFIG_MAX_MODULES=16

# -----------------------------------------------------------------------------
# 系统服务
# -----------------------------------------------------------------------------

CONFIG_SYS_LOG_LEVEL=3
CONFIG_SYS_LOG_ENABLE=y
CONFIG_SYS_MEMORY_ENABLE=y
CONFIG_SYS_TIMER_ENABLE=y

# 看门狗：默认关闭；硬件/软件模式见 balanced.conf 或 tests/prj_test_watchdog.conf
CONFIG_SYS_WATCHDOG_TIMEOUT_MS=5000

# -----------------------------------------------------------------------------
# 应用功能
# -----------------------------------------------------------------------------

CONFIG_APP_ENABLE_SHELL=y
CONFIG_APP_ENABLE_STATS=y
CONFIG_APP_ENABLE_LOG_DUMP=y
CONFIG_APP_ENABLE_TOP=y
CONFIG_APP_HEARTBEAT_INTERVAL_MS=1000

# 示例模块 A/B（默认启用；GPIO/UART 见 conf/examples/）
CONFIG_EXAMPLE_MODULE_A_ENABLE=y
CONFIG_EXAMPLE_MODULE_B_ENABLE=y

# KV：默认 RAM 模式；掉电保存见 conf/features/app_kv_persist.conf
# CONFIG_APP_KV_ENABLE=y
# CONFIG_APP_KV_PERSIST=y
