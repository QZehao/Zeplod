# =============================================================================
# 内存档位：平衡版（叠加于默认链，覆盖 standard.conf 中的差异项）
# =============================================================================
#
# 用途：中等资源 MCU，在功能与 RAM 之间取平衡
# 目标 SRAM：64–128KB | 框架占用：约 40KB
# 示例板型：STM32L4、nRF52832
#
# 构建（推荐）：
#   west build -b nucleo_l4r5zi . -- -DEXTRA_CONF_FILE=conf/profiles/balanced.conf
#
# 与 minimal.conf / tiny.conf 互斥
#
# =============================================================================

# --- 内核内存 ---
CONFIG_HEAP_MEM_POOL_SIZE=16384
CONFIG_MAIN_STACK_SIZE=3072
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=1536
CONFIG_EVENT_DISPATCHER_STACK_SIZE=1536

# --- 事件系统 ---
CONFIG_EVENT_QUEUE_SIZE=32
CONFIG_EVENT_MAX_SUBSCRIBERS=8
CONFIG_EVENT_SLAB_CRITICAL_COUNT=4
CONFIG_EVENT_SLAB_HIGH_COUNT=8
CONFIG_EVENT_SLAB_NORMAL_COUNT=16
CONFIG_EVENT_SLAB_LARGE_256_COUNT=4
CONFIG_EVENT_SLAB_LARGE_1K_COUNT=2
CONFIG_EVENT_SLAB_LARGE_4K_COUNT=0

# --- 模块与服务 ---
CONFIG_MAX_MODULES=12
CONFIG_SYS_WATCHDOG_ENABLE=y
CONFIG_SYS_WATCHDOG_TIMEOUT_MS=8000
CONFIG_SYS_WATCHDOG_FORCE_RESET=n
CONFIG_SYS_WATCHDOG_DEFAULT_MODE=0

# --- 应用功能 ---
CONFIG_APP_ENABLE_STATS=n
CONFIG_EXAMPLE_MODULE_B_ENABLE=n

# --- KV：RAM 模式 ---
CONFIG_APP_KV_ENABLE=y
CONFIG_APP_KV_MAX_ENTRIES=8
CONFIG_APP_KV_KEY_MAX_LEN=16
CONFIG_APP_KV_VALUE_MAX_LEN=64
CONFIG_APP_KV_PERSIST=n
