# =============================================================================
# 内存档位：极简版（叠加于默认链，覆盖 standard.conf 中的差异项）
# =============================================================================
#
# 用途：RAM 极受限 MCU，保留核心事件驱动能力
# 目标 SRAM：32–64KB | 框架占用：约 18KB
# 示例板型：STM32F103C8T6
#
# 构建（推荐）：
#   west build -b native_sim . -- -DEXTRA_CONF_FILE=conf/profiles/minimal.conf
#
# 与 balanced.conf / tiny.conf 互斥
#
# =============================================================================

# --- 基础系统 ---
CONFIG_SHELL=n
CONFIG_UART_CONSOLE=n
CONFIG_LOG_DEFAULT_LEVEL=1
CONFIG_LOG_MAX_LEVEL=2
CONFIG_LOG_OVERRIDE_LEVEL=1
CONFIG_LOG_BACKEND_UART=n
CONFIG_ASSERT=n

# --- 内核内存 ---
CONFIG_HEAP_MEM_POOL_SIZE=4096
CONFIG_MAIN_STACK_SIZE=2048
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=1024
CONFIG_EVENT_DISPATCHER_STACK_SIZE=1024
CONFIG_SYS_MEMORY_POOL_SIZE=4096

# --- 事件系统 ---
CONFIG_EVENT_QUEUE_SIZE=16
CONFIG_EVENT_MAX_SUBSCRIBERS=4
CONFIG_EVENT_STRUCT_SIZE_32=y
CONFIG_EVENT_SLAB_CRITICAL_COUNT=2
CONFIG_EVENT_SLAB_HIGH_COUNT=4
CONFIG_EVENT_SLAB_NORMAL_COUNT=8
CONFIG_EVENT_SLAB_LARGE_ENABLE=n
CONFIG_EVENT_RUNTIME_STATUS=n

# --- 模块与服务 ---
CONFIG_MAX_MODULES=8
CONFIG_SYS_LOG_LEVEL=1

# --- 应用功能 ---
CONFIG_APP_ENABLE_SHELL=n
CONFIG_APP_ENABLE_STATS=n
CONFIG_APP_ENABLE_LOG_DUMP=n
CONFIG_APP_HEARTBEAT_INTERVAL_MS=2000
CONFIG_EXAMPLE_MODULE_A_ENABLE=n
CONFIG_EXAMPLE_MODULE_B_ENABLE=n

# --- KV / IPC ---
CONFIG_APP_KV_ENABLE=n
CONFIG_APP_KV_PERSIST=n
CONFIG_THREAD_IPC_SERVICE=n
CONFIG_DATA_BUS=n
