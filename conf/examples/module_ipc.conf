# =============================================================================
# 示例片段：Thread IPC 模块集成（叠加于 prj.conf）
# =============================================================================
#
# 用途：启用 example_module_ipc（要求 prj.conf 已含 CONFIG_THREAD_IPC_SERVICE=y）
# 注意：与内置 ipc_service_example 同时打开会吃紧 RAM，本片段已关闭后者
#
# 构建：
#   west build -b <board> . -- -DCONF_FILE="prj.conf;conf/examples/module_ipc.conf"
#
# 或使用 EXTRA_CONF_FILE（绝对/相对路径均可）：
#   west build -b <board> . -- "-DEXTRA_CONF_FILE=conf/examples/module_ipc.conf"
#
# =============================================================================

CONFIG_EXAMPLE_MODULE_THREAD_IPC=y
CONFIG_THREAD_IPC_SERVICE_EXAMPLE=n
