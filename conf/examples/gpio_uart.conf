# =============================================================================
# 示例片段：GPIO / UART 模块（叠加于 prj.conf）
# =============================================================================
#
# 用途：启用 GPIO 与 UART 示例模块
# 硬件：板级 devicetree 需提供 led0；按键可选 sw0（无 sw0 时示例关闭按键功能）
#
# 构建：
#   west build -b <board> . -- -DCONF_FILE="prj.conf;conf/examples/gpio_uart.conf"
#
# =============================================================================

CONFIG_EXAMPLE_MODULE_GPIO=y
CONFIG_EXAMPLE_MODULE_UART=y
