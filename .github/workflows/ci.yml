# GitHub Actions CI workflow
name: Zephyr Build CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 0 * * 0"

env:
  ZEPHYR_VERSION: 3.6.0
  BUILD_TYPE: release
  CORE_COVERAGE_MIN: 80

jobs:
  code-quality:
    name: Code Quality
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck python3-pip

      - name: ShellCheck (scripts/*.sh)
        run: |
          mapfile -t sh_files < <(find scripts -name "*.sh" -type f | sort)
          if [ ${#sh_files[@]} -eq 0 ]; then
            echo "No shell scripts found, skipping."
            exit 0
          fi
          shellcheck "${sh_files[@]}"

      - name: Run pre-commit hooks
        run: |
          python3 -m pip install --user pre-commit
          export PATH="$HOME/.local/bin:$PATH"
          pre-commit run --all-files

      - name: Check UTF-8 encoding (no BOM)
        run: python3 scripts/check_encoding.py

  build-native:
    name: Build (Native POSIX)
    runs-on: ubuntu-22.04
    needs: code-quality
    container:
      image: gcr.io/zephyr-project/zephyr-build:v${{ env.ZEPHYR_VERSION }}
      options: --user root

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          apt-get update
          apt-get install -y cmake ninja-build python3-pip

      - name: Install West
        run: pip3 install west

      - name: Initialize West
        run: west init -l .

      - name: Update modules
        run: west update

      - name: Export Zephyr CMake package
        run: west zephyr-export

      - name: Build (native_posix)
        run: |
          west build -b native_posix --build-dir build_native
          echo "Build succeeded."

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: zephyr-native-${{ github.sha }}
          path: build_native/zephyr/zephyr.elf
          retention-days: 7

  build-tests:
    name: Unit Tests (native_posix)
    runs-on: ubuntu-22.04
    needs: code-quality
    container:
      image: gcr.io/zephyr-project/zephyr-build:v${{ env.ZEPHYR_VERSION }}
      options: --user root

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          apt-get update
          apt-get install -y cmake ninja-build python3-pip

      - name: Install West and gcovr
        run: pip3 install west gcovr

      - name: Initialize West
        run: west init -l .

      - name: Update modules
        run: west update

      - name: Export Zephyr CMake package
        run: west zephyr-export

      - name: Build and run unit tests
        run: |
          west build -b native_posix tests/ --build-dir build_tests -p always
          west build -t run --build-dir build_tests

      - name: Run core coverage gate
        run: |
          west build -b native_posix tests/ --build-dir build_tests_cov -p always -- -DCMAKE_C_FLAGS="--coverage"
          west build -t run --build-dir build_tests_cov
          gcovr -r . --filter "src/core/" --xml-pretty --output coverage-core.xml --html --html-details --output coverage-core.html --print-summary --fail-under-line ${{ env.CORE_COVERAGE_MIN }}

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v4
        with:
          name: core-coverage-${{ github.sha }}
          path: |
            coverage-core.xml
            coverage-core.html
          retention-days: 7

  build-sanitizers:
    name: Sanitizers (native_posix)
    runs-on: ubuntu-22.04
    needs: code-quality
    container:
      image: gcr.io/zephyr-project/zephyr-build:v${{ env.ZEPHYR_VERSION }}
      options: --user root

    strategy:
      fail-fast: false
      matrix:
        sanitizer: [asan, ubsan]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          apt-get update
          apt-get install -y cmake ninja-build python3-pip

      - name: Install West
        run: pip3 install west

      - name: Initialize West
        run: west init -l .

      - name: Update modules
        run: west update

      - name: Export Zephyr CMake package
        run: west zephyr-export

      - name: Build and run with sanitizer (${{ matrix.sanitizer }})
        run: |
          if [ "${{ matrix.sanitizer }}" = "asan" ]; then
            SAN_FLAGS="-fsanitize=address -fno-omit-frame-pointer -g"
          else
            SAN_FLAGS="-fsanitize=undefined -fno-omit-frame-pointer -g"
          fi
          west build -b native_posix tests/ --build-dir build_san_${{ matrix.sanitizer }} -p always -- \
            -DCMAKE_C_FLAGS="${SAN_FLAGS}" \
            -DCMAKE_EXE_LINKER_FLAGS="${SAN_FLAGS}"
          west build -t run --build-dir build_san_${{ matrix.sanitizer }}

  twister:
    name: Twister (native_posix)
    runs-on: ubuntu-22.04
    needs: code-quality
    container:
      image: gcr.io/zephyr-project/zephyr-build:v${{ env.ZEPHYR_VERSION }}
      options: --user root

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          apt-get update
          apt-get install -y cmake ninja-build python3-pip

      - name: Install West
        run: pip3 install west

      - name: Initialize West
        run: west init -l .

      - name: Update modules
        run: west update

      - name: Export Zephyr CMake package
        run: west zephyr-export

      - name: Run twister
        run: west twister -T tests -p native_posix -O twister-out --inline-logs

      - name: Upload twister artifacts
        uses: actions/upload-artifact@v4
        with:
          name: twister-${{ github.sha }}
          path: twister-out
          retention-days: 7

  build-arm:
    name: Build (ARM Cortex-M)
    runs-on: ubuntu-22.04
    needs: code-quality
    container:
      image: gcr.io/zephyr-project/zephyr-build:v${{ env.ZEPHYR_VERSION }}
      options: --user root

    strategy:
      fail-fast: false
      matrix:
        board:
          - nucleo_f429zi
          - nucleo_f767zi
          - disco_l475_iot1

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          apt-get update
          apt-get install -y cmake ninja-build python3-pip

      - name: Install West
        run: pip3 install west

      - name: Initialize West
        run: west init -l .

      - name: Update modules
        run: west update

      - name: Export Zephyr CMake package
        run: west zephyr-export

      - name: Build (${{ matrix.board }})
        run: |
          west build -b ${{ matrix.board }} --build-dir build_${{ matrix.board }}
          echo "Build succeeded: ${{ matrix.board }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: zephyr-${{ matrix.board }}-${{ github.sha }}
          path: build_${{ matrix.board }}/zephyr/zephyr.bin
          retention-days: 7

  docs:
    name: Generate Documentation
    runs-on: ubuntu-22.04
    needs: code-quality
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Doxygen
        run: |
          sudo apt-get update
          sudo apt-get install -y doxygen graphviz

      - name: Generate docs
        run: |
          if [ -f Doxyfile ]; then
            doxygen Doxyfile
            echo "Documentation generated."
          else
            echo "Doxyfile not found, skipping."
          fi

      - name: Upload docs artifact
        uses: actions/upload-artifact@v4
        with:
          name: documentation
          path: docs/api/
          retention-days: 7

  release:
    name: Create Release
    runs-on: ubuntu-22.04
    needs: [build-native, build-arm, build-tests]
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: zephyr-*
          merge-multiple: true
          path: ./release/

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: ./release/**
          generate_release_notes: true
          draft: false
