# GitHub Actions CI workflow
name: Zephyr Build CI

on:
  push:
    branches: [main, develop]
    paths:
      - "src/**"
      - "tests/**"
      - "scripts/**"
      - "docs/**"
      - ".github/workflows/**"
      - "CMakeLists.txt"
      - "Kconfig*"
      - "prj*.conf"
      - ".pre-commit-config.yaml"
  pull_request:
    branches: [main]
    paths:
      - "src/**"
      - "tests/**"
      - "scripts/**"
      - "docs/**"
      - ".github/workflows/**"
      - "CMakeLists.txt"
      - "Kconfig*"
      - "prj*.conf"
      - ".pre-commit-config.yaml"
  schedule:
    - cron: "0 0 * * 0"

env:
  ZEPHYR_VERSION: 4.3.0
  BUILD_TYPE: release
  CORE_COVERAGE_MIN: 80
  EVENT_CORE_COVERAGE_MIN: 78
  DISPATCHER_COVERAGE_MIN: 75

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-22.04
    outputs:
      run_heavy: ${{ steps.filter.outputs.run_heavy }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Detect heavy-impact changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            run_heavy:
              - 'src/**'
              - 'tests/**'
              - 'scripts/**'
              - 'CMakeLists.txt'
              - 'Kconfig*'
              - 'prj*.conf'
              - '.github/workflows/**'

  code-quality:
    name: Code Quality
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck python3-pip

      - name: ShellCheck (scripts/*.sh)
        run: |
          mapfile -t sh_files < <(find scripts -name "*.sh" -type f | sort)
          if [ ${#sh_files[@]} -eq 0 ]; then
            echo "No shell scripts found, skipping."
            exit 0
          fi
          shellcheck "${sh_files[@]}"

      - name: Run pre-commit hooks
        run: |
          python3 -m pip install --user pre-commit
          export PATH="$HOME/.local/bin:$PATH"
          pre-commit run --all-files

      - name: Check UTF-8 encoding (no BOM)
        run: python3 scripts/check_encoding.py

      - name: Check scripts docs consistency
        run: python3 scripts/check_script_docs.py

  preflight:
    name: Preflight Checks
    runs-on: ubuntu-22.04
    needs: [changes, code-quality]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify key files and script syntax
        run: |
          test -f tests/testsuite.yaml
          test -f .pre-commit-config.yaml
          python3 -m py_compile scripts/check_encoding.py scripts/check_script_docs.py scripts/preflight_host_tests.py
          bash -n scripts/run_tests.sh
          bash -n scripts/run_sanitizers.sh
          bash -n scripts/run_twister.sh
          bash -n scripts/qa.sh

  build-native:
    name: Build (Native Sim)
    runs-on: ubuntu-22.04
    needs: [changes, preflight]
    if: needs.changes.outputs.run_heavy == 'true'
    container:
      image: gcr.io/zephyr-project/zephyr-build:v${{ env.ZEPHYR_VERSION }}
      options: --user root

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          apt-get update
          apt-get install -y cmake ninja-build python3-pip

      - name: Install West
        run: pip3 install west

      - name: Initialize West
        run: west init -l .

      - name: Update modules
        run: west update

      - name: Export Zephyr CMake package
        run: west zephyr-export

      - name: Build (native_sim)
        run: |
          west build -b native_sim --build-dir build_native
          echo "Build succeeded."

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: zephyr-native-${{ github.sha }}
          path: build_native/zephyr/zephyr.elf
          retention-days: 7

  build-tests:
    name: Unit Tests (native_sim)
    runs-on: ubuntu-22.04
    needs: [changes, preflight]
    if: needs.changes.outputs.run_heavy == 'true'
    container:
      image: gcr.io/zephyr-project/zephyr-build:v${{ env.ZEPHYR_VERSION }}
      options: --user root

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          apt-get update
          apt-get install -y cmake ninja-build python3-pip

      - name: Install West and gcovr
        run: pip3 install west gcovr

      - name: Initialize West
        run: west init -l .

      - name: Update modules
        run: west update

      - name: Export Zephyr CMake package
        run: west zephyr-export

      - name: Build and run unit tests
        run: |
          west build -b native_sim tests/ --build-dir build_tests -p always
          west build -t run --build-dir build_tests

      - name: Run BLOCK overflow config tests
        run: |
          west build -b native_sim tests/ --build-dir build_tests_block -p always \
            -- -DCONF_FILE="prj.conf;prj_block_overflow.conf"
          west build -t run --build-dir build_tests_block

      - name: Run core coverage gate
        run: |
          west build -b native_sim tests/ --build-dir build_tests_cov -p always -- -DCMAKE_C_FLAGS="--coverage"
          west build -t run --build-dir build_tests_cov
          gcovr -r . --filter "src/core/" --xml-pretty --output coverage-core.xml --html --html-details --output coverage-core.html --print-summary --fail-under-line ${{ env.CORE_COVERAGE_MIN }}
          gcovr -r . --filter "src/core/event_.*" --print-summary --fail-under-line ${{ env.EVENT_CORE_COVERAGE_MIN }}
          gcovr -r . --filter "src/core/event_dispatcher\\.c" --print-summary --fail-under-line ${{ env.DISPATCHER_COVERAGE_MIN }}
          gcovr -r . --filter "src/core/" --json-summary-pretty --output coverage-core-summary.json

      - name: Publish coverage summary
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path
          s = json.loads(Path("coverage-core-summary.json").read_text())
          line = s["line_percent"]
          print(f"Core line coverage: {line:.2f}%")
          md = [
              "## Coverage Summary",
              "",
              "| Scope | Threshold | Result |",
              "|---|---:|---:|",
              f"| src/core/* | ${{{{ env.CORE_COVERAGE_MIN }}}}% | {line:.2f}% |",
              f"| src/core/event_* | ${{{{ env.EVENT_CORE_COVERAGE_MIN }}}}% | see gate log |",
              f"| src/core/event_dispatcher.c | ${{{{ env.DISPATCHER_COVERAGE_MIN }}}}% | see gate log |",
          ]
          Path("${GITHUB_STEP_SUMMARY}").write_text("\n".join(md), encoding="utf-8")
          PY

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v4
        with:
          name: core-coverage-${{ github.sha }}
          path: |
            coverage-core.xml
            coverage-core.html
          retention-days: 7

  build-sanitizers:
    name: Sanitizers (native_sim)
    runs-on: ubuntu-22.04
    needs: [changes, preflight]
    if: needs.changes.outputs.run_heavy == 'true'
    container:
      image: gcr.io/zephyr-project/zephyr-build:v${{ env.ZEPHYR_VERSION }}
      options: --user root

    strategy:
      fail-fast: false
      matrix:
        sanitizer: [asan, ubsan]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          apt-get update
          apt-get install -y cmake ninja-build python3-pip

      - name: Install West
        run: pip3 install west

      - name: Initialize West
        run: west init -l .

      - name: Update modules
        run: west update

      - name: Export Zephyr CMake package
        run: west zephyr-export

      - name: Build and run with sanitizer (${{ matrix.sanitizer }})
        run: |
          if [ "${{ matrix.sanitizer }}" = "asan" ]; then
            SAN_FLAGS="-fsanitize=address -fno-omit-frame-pointer -g"
          else
            SAN_FLAGS="-fsanitize=undefined -fno-omit-frame-pointer -g"
          fi
          west build -b native_sim tests/ --build-dir build_san_${{ matrix.sanitizer }} -p always -- \
            -DCMAKE_C_FLAGS="${SAN_FLAGS}" \
            -DCMAKE_EXE_LINKER_FLAGS="${SAN_FLAGS}"
          west build -t run --build-dir build_san_${{ matrix.sanitizer }}

  twister:
    name: Twister (native_sim)
    runs-on: ubuntu-22.04
    needs: [changes, preflight]
    if: needs.changes.outputs.run_heavy == 'true'
    container:
      image: gcr.io/zephyr-project/zephyr-build:v${{ env.ZEPHYR_VERSION }}
      options: --user root

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          apt-get update
          apt-get install -y cmake ninja-build python3-pip

      - name: Install West
        run: pip3 install west

      - name: Initialize West
        run: west init -l .

      - name: Update modules
        run: west update

      - name: Export Zephyr CMake package
        run: west zephyr-export

      - name: Run twister
        run: west twister -T tests -p native_sim -O twister-out --inline-logs

      - name: Upload twister artifacts
        uses: actions/upload-artifact@v4
        with:
          name: twister-${{ github.sha }}
          path: twister-out
          retention-days: 7

  build-arm:
    name: Build (ARM Cortex-M)
    runs-on: ubuntu-22.04
    needs: [changes, preflight]
    if: needs.changes.outputs.run_heavy == 'true'
    container:
      image: gcr.io/zephyr-project/zephyr-build:v${{ env.ZEPHYR_VERSION }}
      options: --user root

    strategy:
      fail-fast: false
      matrix:
        board:
          - nucleo_f429zi
          - nucleo_f767zi
          - disco_l475_iot1

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          apt-get update
          apt-get install -y cmake ninja-build python3-pip

      - name: Install West
        run: pip3 install west

      - name: Initialize West
        run: west init -l .

      - name: Update modules
        run: west update

      - name: Export Zephyr CMake package
        run: west zephyr-export

      - name: Build (${{ matrix.board }})
        run: |
          west build -b ${{ matrix.board }} --build-dir build_${{ matrix.board }}
          echo "Build succeeded: ${{ matrix.board }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: zephyr-${{ matrix.board }}-${{ github.sha }}
          path: build_${{ matrix.board }}/zephyr/zephyr.bin
          retention-days: 7

  docs:
    name: Generate Documentation
    runs-on: ubuntu-22.04
    needs: preflight
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Doxygen
        run: |
          sudo apt-get update
          sudo apt-get install -y doxygen graphviz

      - name: Generate docs
        run: |
          if [ -f Doxyfile ]; then
            doxygen Doxyfile
            echo "Documentation generated."
          else
            echo "Doxyfile not found, skipping."
          fi

      - name: Upload docs artifact
        uses: actions/upload-artifact@v4
        with:
          name: documentation
          path: docs/api/
          retention-days: 7

  release:
    name: Create Release
    runs-on: ubuntu-22.04
    needs: [build-native, build-arm, build-tests]
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: zephyr-*
          merge-multiple: true
          path: ./release/

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: ./release/**
          generate_release_notes: true
          draft: false
