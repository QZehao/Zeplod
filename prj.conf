# Minimal configuration - let board defconfig handle SOC selection

# =============================================================================
# IPC Service Framework Configuration
# =============================================================================

CONFIG_IPC_SERVICE=y

# Optional: Enable example code (for testing/demo)
CONFIG_IPC_SERVICE_EXAMPLE=y

# Tuning parameters (adjust based on your needs)
CONFIG_IPC_SERVICE_MAX_PENDING_REQUESTS=16
CONFIG_IPC_SERVICE_REQUEST_QUEUE_SIZE=8
CONFIG_IPC_SERVICE_RESPONSE_QUEUE_SIZE=8
CONFIG_IPC_SERVICE_STACK_SIZE=2048
CONFIG_IPC_SERVICE_PRIORITY=5
CONFIG_IPC_SERVICE_LOG_LEVEL=3
