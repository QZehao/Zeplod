# =============================================================================
# 公共基线 — Zeplod 所有构建均从此文件起步（Zephyr 自动加载）
# =============================================================================
#
# 本文件仅含各档位共用的框架开关与索引；完整默认配置由 CMake 自动叠加：
#   conf/profiles/standard.conf
#   conf/features/data_bus.conf
#   conf/features/thread_ipc.conf
#
# 目录说明（详见 conf/README.md）：
#
#   conf/profiles/   内存档位（互斥）
#     standard.conf  标准版（≥256KB SRAM，默认自动合并）
#     balanced.conf  平衡版（64–128KB）
#     minimal.conf   极简版（32–64KB）
#     tiny.conf      极限版（≤32KB）
#
#   conf/targets/    目标环境（如 qemu.conf）
#   conf/features/   可选功能（KV 持久化、快速启动等）
#   conf/examples/   示例模块片段
#
# 档位切换（在默认构建基础上追加，推荐 EXTRA_CONF_FILE）：
#   west build -b <board> . -- -DEXTRA_CONF_FILE=conf/profiles/balanced.conf
#
# 完全自定义合并链：
#   west build -b <board> . -- -DCONF_FILE="prj.conf;conf/profiles/standard.conf;..."
#
# =============================================================================

# -----------------------------------------------------------------------------
# 框架核心 — 各档位均启用
# -----------------------------------------------------------------------------

CONFIG_EVENT_SYSTEM=y
CONFIG_MODULE_MANAGER=y
CONFIG_EVENT_DISPATCHER_PRIORITY=5

# -----------------------------------------------------------------------------
# 安全默认值 — 无档位片段时保持保守
# -----------------------------------------------------------------------------

CONFIG_SYS_WATCHDOG_ENABLE=n
CONFIG_WATCHDOG=n
