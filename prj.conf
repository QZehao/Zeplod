# Zephyr Event-Driven Project Template Configuration
# SPDX-License-Identifier: Apache-2.0

# =============================================================================
# Kernel Configuration
# =============================================================================
CONFIG_KERNEL=y
CONFIG_MULTITHREADING=y
CONFIG_ARCH_ISR_STACK_SIZE=4096
CONFIG_MAIN_STACK_SIZE=4096

# Priority settings
CONFIG_NUM_PREEMPT_PRIORITIES=16
CONFIG_NUM_COOP_PRIORITIES=16
CONFIG_NUM_METAIRQ_PRIORITIES=0

# =============================================================================
# Synchronization & IPC
# =============================================================================
CONFIG_MUTEX=y
CONFIG_SEMAPHORE=y
CONFIG_EVENTS=y
CONFIG_EVENT=y
CONFIG_MSGQ=y
CONFIG_MBOX=y

# =============================================================================
# Memory Management
# =============================================================================
CONFIG_HEAP_MEM_POOL_SIZE=16384
CONFIG_MEM_HEAP=y
CONFIG_STACK_SENTINEL=y
CONFIG_INIT_STACKS=y

# =============================================================================
# Timing & Scheduling
# =============================================================================
CONFIG_SYS_CLOCK_TICKS_PER_SEC=1000
CONFIG_TIMEOUT_64BIT=y
CONFIG_SCHED_DUMB=y

# =============================================================================
# Logging System
# =============================================================================
CONFIG_LOG=y
CONFIG_LOG_MODE_DEFERRED=y
CONFIG_LOG_DEFAULT_LEVEL_INFO=y
CONFIG_LOG_PRINTK=y
CONFIG_LOG_THREAD_NAME=y
CONFIG_LOG_TIMESTAMP_SOURCE_TICKS=y

# =============================================================================
# Console & Shell
# =============================================================================
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y
CONFIG_SHELL=y
CONFIG_SHELL_BACKEND_SERIAL=y
CONFIG_SHELL_STACK_SIZE=2048

# =============================================================================
# Hardware Abstraction
# =============================================================================
CONFIG_GPIO=y
CONFIG_GPIO_INTERRUPT=y
CONFIG_COUNTER=y
CONFIG_WDT=y

# =============================================================================
# Power Management
# =============================================================================
CONFIG_PM=y
CONFIG_PM_DEVICE=y

# =============================================================================
# Debug & Tracing
# =============================================================================
CONFIG_ASSERT=y
CONFIG_STACK_CHECK=y
CONFIG_THREAD_NAME=y

# =============================================================================
# Application Specific
# =============================================================================
CONFIG_EVENT_SYSTEM=y
CONFIG_EVENT_QUEUE_SIZE=64
CONFIG_EVENT_MAX_SUBSCRIBERS=16
CONFIG_MODULE_MANAGER=y
CONFIG_MAX_MODULES=16
