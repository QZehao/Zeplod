# 合并示例：为 app_kv 启用掉电保存（Zephyr Settings + NVS）
#
# west build -b nucleo_l4r5zi . -- "-DEXTRA_CONF_FILE=prj_app_kv_persist.conf"
#
# 要求：
# - 板级 devicetree 中已有 storage 分区，且 chosen 指向该分区。
# - nucleo_l4r5zi：boards/nucleo_l4r5zi.overlay 同时含 640KB SRAM + zephyr,settings-partition（缺一不可）。
# - 其它板请自行增加 overlay，勿盲目合并本文件。
#
# SETTINGS_NVS 为 Zephyr Kconfig「choice」项，应用侧不能用 select；须在此显式打开：

CONFIG_SETTINGS=y
CONFIG_NVS=y
CONFIG_FLASH_MAP=y
CONFIG_SETTINGS_NVS=y

CONFIG_APP_KV_PERSIST=y
# 每次 set/del/clear 都写 flash（耗寿命）；默认关，改用 app kv save 或 app_kv_save()
# CONFIG_APP_KV_PERSIST_AUTOSAVE=y
