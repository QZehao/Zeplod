# Data Bus fixed-pool profile: exercise all optimized slab tiers without malloc fallback.
CONFIG_DATA_BUS_NO_MALLOC=y
CONFIG_DATA_BUS_SLAB_ENABLE=y
CONFIG_DATA_BUS_SLAB_64_COUNT=2
CONFIG_DATA_BUS_SLAB_128_COUNT=2
CONFIG_DATA_BUS_SLAB_256_COUNT=4
CONFIG_DATA_BUS_SLAB_512_COUNT=2
CONFIG_DATA_BUS_SLAB_1K_COUNT=2
CONFIG_DATA_BUS_SLAB_4K_COUNT=1
