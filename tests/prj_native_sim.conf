# 单元测试（native_sim）— 无硬件限制，完整测试覆盖

CONFIG_ZTEST=y
CONFIG_TEST=y

CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3

# 加大堆用于完整测试
CONFIG_HEAP_MEM_POOL_SIZE=32768
CONFIG_MAIN_STACK_SIZE=8192

# 事件系统 Slab 配置（完整配置）
CONFIG_EVENT_SLAB_ENABLE=y
CONFIG_EVENT_SLAB_NORMAL_COUNT=16
CONFIG_EVENT_SLAB_HIGH_COUNT=4
CONFIG_EVENT_SLAB_CRITICAL_COUNT=2
CONFIG_EVENT_SLAB_LARGE_ENABLE=y
CONFIG_EVENT_SLAB_LARGE_256_COUNT=4
CONFIG_EVENT_SLAB_LARGE_1K_COUNT=2
CONFIG_EVENT_SLAB_LARGE_4K_COUNT=1
CONFIG_EVENT_RUNTIME_STATUS=y
CONFIG_EVENT_SLAB_EXHAUSTED_CB=y
CONFIG_EVENT_DEBUG_MEM=y
# 选择 64 字节事件结构 (内联数据 48 字节)
CONFIG_EVENT_STRUCT_SIZE_64=y

# Thread IPC 完整测试
CONFIG_THREAD_IPC_SERVICE=y
CONFIG_THREAD_IPC_SERVICE_EXAMPLE=n
CONFIG_THREAD_IPC_SERVICE_EVENT_BRIDGE=n
CONFIG_THREAD_IPC_SERVICE_SHARED_MEM=y
CONFIG_THREAD_IPC_SERVICE_MAX_PENDING_REQUESTS=8
CONFIG_THREAD_IPC_SERVICE_REQUEST_QUEUE_SIZE=6
CONFIG_THREAD_IPC_SERVICE_RESPONSE_QUEUE_SIZE=6
CONFIG_THREAD_IPC_SERVICE_STACK_SIZE=4096
CONFIG_THREAD_IPC_SERVICE_PRIORITY=5
CONFIG_THREAD_IPC_SERVICE_LOG_LEVEL=3
CONFIG_THREAD_IPC_SERVICE_SHARED_MEM_POOL_SIZE=8
CONFIG_THREAD_IPC_SERVICE_SHARED_MEM_BLOCK_SIZE=256
CONFIG_THREAD_IPC_SERVICE_SHARED_MEM_LOG_LEVEL=3

# UART 模块测试配置
CONFIG_EXAMPLE_MODULE_UART=n

CONFIG_EXAMPLE_MODULE_THREAD_IPC=n

# 禁用看门狗（native_sim 无硬件看门狗）
CONFIG_WATCHDOG=n
CONFIG_SYS_WATCHDOG_ENABLE=n
CONFIG_SYS_WATCHDOG_FORCE_RESET=n
