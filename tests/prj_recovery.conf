# Recovery policy 单元测试叠加层
# west build ... -- -DCONF_FILE="prj.conf;prj_recovery.conf"

CONFIG_RECOVERY_POLICY_MODULE=y
CONFIG_RECOVERY_POLICY_AUTOINIT=n
CONFIG_RECOVERY_POLICY_MAX_RESTARTS=2
CONFIG_RECOVERY_POLICY_OTA_HOOK=n
CONFIG_RECOVERY_POLICY_WATCHDOG_HOOK=n
CONFIG_SYS_FAULT_DUMP_ENABLE=y
CONFIG_MODULE_MANAGER=y
CONFIG_EVENT_SYSTEM=y