# QEMU 单元测试覆盖率叠加层（须与 prj.conf 联用）
# 推荐 CONF 链（run_qemu.ps1 -Tests -Coverage 默认）:
#   prj.conf;prj_test_extensions.conf;prj_qemu_coverage.conf;prj_block_overflow.conf

# gcov 插桩显著增加栈/RAM，须加大堆与各服务线程栈
CONFIG_HEAP_MEM_POOL_SIZE=65536
CONFIG_MAIN_STACK_SIZE=8192
CONFIG_ZTEST_STACK_SIZE=8192
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=4096

CONFIG_DATA_BUS_DISPATCHER_STACK_SIZE=8192
CONFIG_EVENT_DISPATCHER_STACK_SIZE=4096

# 扩展 src/core 可选特性（提升 event_memory / event_system 行覆盖）
CONFIG_EVENT_SLAB_NORMAL_COUNT=16
CONFIG_EVENT_SLAB_HIGH_COUNT=4
CONFIG_EVENT_SLAB_CRITICAL_COUNT=2
CONFIG_EVENT_SLAB_LARGE_ENABLE=y
CONFIG_EVENT_SLAB_LARGE_256_COUNT=4
CONFIG_EVENT_SLAB_LARGE_1K_COUNT=2
CONFIG_EVENT_SLAB_LARGE_4K_COUNT=1
CONFIG_EVENT_RUNTIME_STATUS=y
CONFIG_EVENT_SLAB_EXHAUSTED_CB=y
CONFIG_EVENT_DEBUG_MEM=y

# QEMU + coverage 下并发压测易栈溢出，覆盖率构建默认关闭
CONFIG_ZTEST_CONCURRENCY_STRESS=n
