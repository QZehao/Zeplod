# 叠加到 prj.conf（及可选 prj_native_sim.conf）以启用示例模块测试
# 示例: west build -b native_sim tests/ --build-dir build_tests_full -p always \
#   -- -DCONF_FILE="prj.conf;prj_native_sim.conf;prj_ci_examples.conf"

CONFIG_EXAMPLE_MODULE_A_ENABLE=y
CONFIG_EXAMPLE_MODULE_B_ENABLE=y
CONFIG_EXAMPLE_MODULE_MULTI_DEP=y
CONFIG_EXAMPLE_MODULE_GPIO=y
CONFIG_EXAMPLE_MODULE_UART=n
CONFIG_EXAMPLE_MODULE_THREAD_IPC=n
