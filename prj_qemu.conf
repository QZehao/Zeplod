# =============================================================================
# QEMU 仿真叠加配置
# =============================================================================
#
# 用法（Windows / Linux 通用）：
#   west build -b qemu_riscv32 -d build_qemu . -- "-DCONF_FILE=prj.conf;prj_qemu.conf"
#   west build -t run --build-dir build_qemu
#
# 说明：
#   - 在 prj.conf 基础上削减 RAM/栈，适配 ARM QEMU 等小内存仿真板
#   - 保持软件看门狗关闭（避免 sys_reboot 链接问题）
#   - qemu_riscv32 / qemu_x86_64 等内存充裕板型同样可用
#
# =============================================================================

# 内核内存 - 精简
CONFIG_HEAP_MEM_POOL_SIZE=16384
CONFIG_MAIN_STACK_SIZE=4096
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2048
CONFIG_EVENT_DISPATCHER_STACK_SIZE=2048
CONFIG_SYS_MEMORY_POOL_SIZE=4096

# 事件系统 - 精简
CONFIG_EVENT_QUEUE_SIZE=32
CONFIG_EVENT_MAX_SUBSCRIBERS=8
CONFIG_EVENT_SLAB_CRITICAL_COUNT=4
CONFIG_EVENT_SLAB_HIGH_COUNT=8
CONFIG_EVENT_SLAB_NORMAL_COUNT=16
CONFIG_EVENT_SLAB_LARGE_256_COUNT=4
CONFIG_EVENT_SLAB_LARGE_1K_COUNT=2
CONFIG_EVENT_SLAB_LARGE_4K_COUNT=0

# 模块 - 单示例即可验证启动
CONFIG_MAX_MODULES=8
CONFIG_EXAMPLE_MODULE_A_ENABLE=y
CONFIG_EXAMPLE_MODULE_B_ENABLE=n

# 应用 - 关闭非必要功能
CONFIG_APP_KV_ENABLE=n
CONFIG_APP_ENABLE_STATS=n
CONFIG_APP_ENABLE_LOG_DUMP=n

# 看门狗保持关闭（QEMU 上无硬件 WDT；软件模式勿启用 force reset）
CONFIG_SYS_WATCHDOG_ENABLE=n
CONFIG_WATCHDOG=n
