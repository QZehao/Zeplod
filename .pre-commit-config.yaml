repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml

  - repo: https://github.com/pre-commit/mirrors-clang-format
    rev: v19.1.7
    hooks:
      - id: clang-format
        files: \.(c|h|cpp|hpp)$

  - repo: local
    hooks:
      - id: check-encoding
        name: check encoding (utf-8 no bom)
        entry: python scripts/check_encoding.py
        language: system
        pass_filenames: false
      - id: check-script-docs
        name: check script docs
        entry: python scripts/check_script_docs.py
        language: system
        pass_filenames: false
      - id: lint-docs
        name: lint docs (zh-CN)
        entry: python scripts/lint_docs.py docs/zh-CN --skip-config-check --check-index --check-code-map --check-parity --strict
        language: system
        pass_filenames: false
