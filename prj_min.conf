# =============================================================================
# 极简配置 - 资源受限场景（目标 <20KB 静态内存）
# =============================================================================
#
# 适用场景：
#   - RAM 极受限 MCU（如 STM32F103C8T6 20KB SRAM）
#   - 仅需核心事件驱动功能
#   - 不需要调试/交互/高级功能
#
# 使用方法：
#   west build -b native_posix . -DCONF_FILE="prj.conf;prj_min.conf"
#
# 功能限制说明：
#   - 最大 64 种事件类型（原 256）
#   - 每事件类型最多 4 个订阅者（原 16）
#   - 事件队列深度 16（原 64）
#   - 内存池单池 4KB（原 4 池 × 8KB）
#   - 最多 8 个定时器（原 32）
#   - 最多 8 个模块（原 16）
#   - 无 Shell、无统计、无内存跟踪
#   - 日志缓冲仅 32 条
#   - 看门狗禁用
#
# =============================================================================

# =============================================================================
# 基础系统配置 - 最小化
# =============================================================================

# 禁用调试与控制台（保留基本打印）
CONFIG_SHELL=n
CONFIG_CONSOLE=y
CONFIG_SERIAL=y
CONFIG_UART_CONSOLE=n
CONFIG_PRINTK=y
CONFIG_EARLY_CONSOLE=y
CONFIG_BOOT_BANNER=n

# 日志系统 - 仅错误和警告
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=1
CONFIG_LOG_MAX_LEVEL=2
CONFIG_LOG_OVERRIDE_LEVEL=1
CONFIG_LOG_RUNTIME_FILTERING=n
CONFIG_LOG_MODE_IMMEDIATE=y
CONFIG_LOG_BACKEND_UART=n

# 内核日志级别
CONFIG_KERNEL_LOG_LEVEL_ERR=y
CONFIG_ARCH_LOG_LEVEL_ERR=y
CONFIG_MPU_LOG_LEVEL_OFF=y

# 断言禁用（省空间）
CONFIG_DEBUG=n
CONFIG_ASSERT=n

# =============================================================================
# 内核内存配置 - 极小化
# =============================================================================

# Heap 降至 4KB
CONFIG_HEAP_MEM_POOL_SIZE=4096

# 线程栈缩减
CONFIG_MAIN_STACK_SIZE=2048
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=1024
CONFIG_EVENT_DISPATCHER_STACK_SIZE=1024

# 静态内存池降至 4KB
CONFIG_SYS_MEMORY_POOL_SIZE=4096

# =============================================================================
# 核心功能 - 最小可用
# =============================================================================

# 事件系统 - 极小化
CONFIG_EVENT_SYSTEM=y
CONFIG_EVENT_QUEUE_SIZE=16
CONFIG_EVENT_MAX_SUBSCRIBERS=4
CONFIG_EVENT_DISPATCHER_PRIORITY=5

# 模块管理器 - 缩减
CONFIG_MODULE_MANAGER=y
CONFIG_MAX_MODULES=8

# 系统服务 - 仅保留必要功能
CONFIG_SYS_LOG_LEVEL=1
CONFIG_SYS_LOG_ENABLE=y
CONFIG_SYS_MEMORY_ENABLE=y
CONFIG_SYS_TIMER_ENABLE=y

# 看门狗 - 禁用
CONFIG_SYS_WATCHDOG_ENABLE=n

# =============================================================================
# 应用功能 - 禁用非必要
# =============================================================================

CONFIG_APP_ENABLE_SHELL=n
CONFIG_APP_ENABLE_STATS=n
CONFIG_APP_ENABLE_LOG_DUMP=n
CONFIG_APP_HEARTBEAT_INTERVAL_MS=2000

# 示例模块 - 禁用
CONFIG_EXAMPLE_MODULE_A_ENABLE=n
CONFIG_EXAMPLE_MODULE_B_ENABLE=n

# =============================================================================
# KV 存储 - 禁用
# =============================================================================

CONFIG_APP_KV_ENABLE=n
CONFIG_APP_KV_PERSIST=n

# =============================================================================
# Thread IPC - 禁用
# =============================================================================

# CONFIG_THREAD_IPC_SERVICE=n
# CONFIG_THREAD_IPC_SERVICE_EVENT_BRIDGE=n

# =============================================================================
# 其他模块选项 - 禁用
# =============================================================================

# CONFIG_MODULE_MANAGER_RUNTIME_DEPENDENCIES=n
# CONFIG_EXAMPLE_MODULE_GPIO=n
# CONFIG_EXAMPLE_MODULE_UART=n
# CONFIG_EXAMPLE_MODULE_MULTI_DEP=n
# CONFIG_EXAMPLE_MODULE_THREAD_IPC=n
